name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cairosvg pillow

      - name: Generate icon
        run: python generate_icon_win.py

      - name: Build EXE
        run: pyinstaller youtrax_win.spec --noconfirm

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTrax-Windows
          path: dist/YouTrax.exe
          retention-days: 30

      # Only create a GitHub Release when a version tag is pushed (e.g. v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/YouTrax.exe
          generate_release_notes: true
